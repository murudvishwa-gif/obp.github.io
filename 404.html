<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Stackly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0A0E1A;--ink-card:#171D33;--paper:#ECE9E0;--steel:#8890A3;--line:rgba(236,233,224,.12);--green:#00C896;--gold:#C9A227;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:var(--ink);color:var(--paper);font-family:Inter,sans-serif;display:grid;place-items:center;padding:28px}
  body.lightMode{--ink:#F6F7F3;--ink-card:#FFFFFF;--paper:#101521;--steel:#5F6878;--line:rgba(10,14,26,.13);}
  .page{width:min(760px,100%);text-align:center}
  .logo{display:inline-flex;margin-bottom:42px}
  .logo img{width:230px;height:auto;display:block}
  .panel{border:1px solid var(--line);background:var(--ink-card);border-radius:8px;padding:44px 34px}
  .code{font:700 13px 'JetBrains Mono',monospace;color:var(--green);letter-spacing:.16em;text-transform:uppercase}
  h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(36px,7vw,68px);line-height:1.02;margin-top:14px}
  p{color:var(--steel);line-height:1.7;max-width:560px;margin:18px auto 0}
  .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:30px}
  .btn{display:inline-flex;align-items:center;justify-content:center;height:44px;border-radius:8px;border:1px solid var(--line);padding:0 18px;color:var(--paper);text-decoration:none;font-weight:700}
  .btn.primary{background:var(--green);border-color:var(--green);color:var(--ink)}
  .meta{margin-top:22px;color:var(--gold);font:600 12px 'JetBrains Mono',monospace}
  html,body{width:100%;max-width:100%;overflow-x:hidden}
  .page,.panel,.actions{min-width:0}
  .btn{white-space:normal;text-align:center}
  @media(max-width:640px){body{padding:18px}.logo img{width:min(200px,70vw)}.panel{padding:32px 20px}.actions{display:grid}.btn{width:100%}}
  @media(max-width:420px){body{padding:14px}.panel{padding:28px 16px}.logo{margin-bottom:30px}}
</style>
</head>
<body>
  <main class="page">
    <a class="logo" href="index.html"><img src="assets/stackly-logo.webp" alt="STACKLY"></a>
    <section class="panel">
      <div class="code">404 page</div>
      <h1>This page is not ready yet.</h1>
      <p>The button or link you clicked does not have a live destination in this static build. Go back to return to the exact page and position you came from.</p>
      <div class="actions">
        <button class="btn primary" id="goBackBtn" type="button">Go back</button>
        <a class="btn" href="login.html">Login</a>
      </div>
      <div class="meta">STACKLY / MISSING ROUTE</div>
    </section>
  </main>
<script>
  (function(){
    const mode = localStorage.getItem('stacklyThemeMode') || 'dark';
    document.body.classList.toggle('lightMode', mode === 'light');
  })();
  document.getElementById('goBackBtn').addEventListener('click', ()=>{
    const raw = sessionStorage.getItem('stacklyReturnState');
    if(raw){
      try{
        const state = JSON.parse(raw);
        const savedPage = (state.page || '').split('/').pop();
        const refPage = document.referrer ? new URL(document.referrer).pathname.split('/').pop() : '';
        if(!refPage || refPage === savedPage){
          window.location.href = state.page || 'index.html';
          return;
        }
      }catch(e){}
    }
    if(history.length > 1){
      history.back();
      return;
    }
    if(document.referrer){
      window.location.href = document.referrer;
      return;
    }
    window.location.href = 'index.html';
  });
</script>
</body>
</html>
